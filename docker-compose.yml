version: '3.8'

services:
  alvea:
    build: .
    ports:
      - "5000:5000"
    environment:
      - LLM_URL=http://host.docker.internal:11434/v1
      - LLM_MODEL=llama3
    volumes:
      - ./workspace:/app/workspace
      - ./tasks:/app/tasks
      - ./plan:/app/plan
      - ./runtime:/app/runtime
      - ./vision:/app/vision
    restart: unless-stopped
services:

  alvea:
    build: .
    ports:
      - "5000:5000"
    environment:
      - LLM_URL=http://ollama:11434/v1
      - LLM_MODEL=llama3
    volumes:
      - ./workspace:/app/workspace
      - ./tasks:/app/tasks
      - ./plan:/app/plan
      - ./runtime:/app/runtime
      - ./vision:/app/vision
    depends_on:
      ollama-init:
        condition: service_completed_successfully
    restart: unless-stopped

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  ollama-init:
    image: ollama/ollama
    volumes:
      - ollama_data:/root/.ollama
      - ./docker/ollama-init.sh:/ollama-init.sh:ro
    environment:
      - OLLAMA_MODEL=llama3
    entrypoint: ["sh", "/ollama-init.sh"]
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"

volumes:
  ollama_data:
